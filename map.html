<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVC Exchange — Enrollment Flow Map</title>
<script>
(function() {
  var k = 'cvc-oei-auth';
  if (sessionStorage.getItem(k) !== '1') {
    document.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'auth-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:#030712;display:flex;align-items:center;justify-content:center;z-index:9999;';
      overlay.innerHTML = '<div style="background:#0f172a;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:40px;width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.8)">' +
        '<div style="font-size:18px;font-weight:700;margin-bottom:8px;background:linear-gradient(90deg,#00d4ff,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">CVC Exchange Dashboard</div>' +
        '<div style="font-size:13px;color:#475569;margin-bottom:24px">Enter password to continue</div>' +
        '<input id="pw-input" type="password" placeholder="Password" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;margin-bottom:12px;outline:none" />' +
        '<button id="pw-btn" style="width:100%;padding:10px;background:linear-gradient(90deg,#0ea5e9,#8b5cf6);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Enter</button>' +
        '<div id="pw-err" style="color:#f87171;font-size:12px;margin-top:10px;display:none">Incorrect password</div>' +
        '</div>';
      document.body.appendChild(overlay);
      function attempt() {
        if (document.getElementById('pw-input').value === 'cvc-oei') {
          sessionStorage.setItem(k, '1');
          overlay.remove();
        } else {
          document.getElementById('pw-err').style.display = 'block';
          document.getElementById('pw-input').value = '';
          document.getElementById('pw-input').focus();
        }
      }
      document.getElementById('pw-btn').addEventListener('click', attempt);
      document.getElementById('pw-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') attempt(); });
      document.getElementById('pw-input').focus();
    });
  }
})();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
    background: #030712; color: #e2e8f0; font-size: 13px;
    display: flex; flex-direction: column;
  }

  /* Nav */
  nav {
    background: #1a1a2e; display: flex; align-items: center;
    padding: 0 24px; height: 48px; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  nav .brand {
    font-size: 14px; font-weight: 700; margin-right: 32px;
    background: linear-gradient(90deg, #00d4ff, #f472b6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  nav a {
    color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px;
    font-weight: 500; padding: 12px 16px; position: relative;
    transition: color 0.15s;
  }
  nav a:hover { color: #fff; }
  nav a.active { color: #fff; }
  nav a.active::after {
    content: ''; position: absolute; bottom: 0; left: 16px; right: 16px;
    height: 2px; background: #3a7bd5; border-radius: 1px;
  }

  /* Controls bar */
  .controls {
    display: flex; align-items: center; gap: 16px; padding: 12px 24px;
    background: #0a0f1e; border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0; flex-wrap: wrap;
  }
  .controls-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #64748b; font-weight: 600;
  }
  .term-pill {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; border: 1.5px solid #3a7bd5;
    background: transparent; color: #3a7bd5; font-family: inherit;
  }
  .term-pill.active { background: #3a7bd5; color: #fff; }
  .term-pill:hover { opacity: 0.85; }
  .term-pill .pill-count { font-size: 10px; opacity: 0.8; margin-left: 6px; }
  .controls-separator {
    width: 1px; height: 24px; background: rgba(255,255,255,0.08);
  }
  .slider-group { display: flex; align-items: center; gap: 8px; }
  .slider-group input[type=range] {
    -webkit-appearance: none; width: 120px; height: 3px;
    background: rgba(255,255,255,0.1); border-radius: 2px; outline: none;
  }
  .slider-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: #3a7bd5; border-radius: 50%; cursor: pointer;
  }
  .slider-value { font-size: 12px; color: #94a3b8; min-width: 20px; }
  .flow-count-badge { font-size: 11px; color: #64748b; margin-left: 4px; }
  .btn-action {
    padding: 6px 14px; border-radius: 6px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: #94a3b8; font-size: 12px; font-family: inherit; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-action:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
  .btn-right { margin-left: auto; display: flex; gap: 8px; }

  /* Main content */
  .main { flex: 1; display: flex; overflow: hidden; position: relative; }

  /* Sidebar */
  .sidebar {
    width: 300px; background: #0a0f1e; border-left: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto; flex-shrink: 0; display: none; flex-direction: column;
  }
  .sidebar.open { display: flex; }
  .sidebar-header {
    padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .sidebar-header h3 {
    font-size: 14px; font-weight: 700; color: #e2e8f0; margin-bottom: 4px;
  }
  .sidebar-close {
    float: right; background: none; border: none; color: #64748b;
    cursor: pointer; font-size: 18px; line-height: 1;
  }
  .sidebar-close:hover { color: #e2e8f0; }
  .sidebar-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .sidebar-stat {
    background: rgba(255,255,255,0.03); border-radius: 6px; padding: 10px 12px;
  }
  .sidebar-stat .label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #64748b; margin-bottom: 4px;
  }
  .sidebar-stat .value { font-size: 18px; font-weight: 700; }
  .sidebar-stat .value.out { color: #f59e0b; }
  .sidebar-stat .value.in { color: #22d3ee; }
  .sidebar-connections {
    padding: 12px 20px; flex: 1; overflow-y: auto;
  }
  .sidebar-connections h4 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #64748b; margin-bottom: 10px;
  }
  .conn-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px;
  }
  .conn-item:last-child { border-bottom: none; }
  .conn-dir {
    font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 600;
  }
  .conn-dir.out { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .conn-dir.in { background: rgba(34,211,238,0.15); color: #22d3ee; }
  .conn-name { flex: 1; margin: 0 8px; color: #cbd5e1; }
  .conn-count { font-weight: 700; color: #e2e8f0; }

  /* Map area */
  .map-wrap { flex: 1; position: relative; overflow: hidden; }
  .map-wrap svg { width: 100%; height: 100%; }

  /* Tooltip */
  .tooltip {
    position: absolute; pointer-events: none; z-index: 100;
    background: #1e293b; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; padding: 8px 12px; font-size: 12px;
    color: #e2e8f0; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5); display: none;
  }

  /* Footer */
  footer {
    padding: 8px 24px; text-align: center; font-size: 11px;
    color: #475569; background: #0a0f1e;
    border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* Selected colleges legend */
  .sel-legend {
    position: absolute; bottom: 16px; left: 16px; z-index: 10;
    background: rgba(10,15,30,0.92); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 12px 16px; font-size: 11px;
    max-height: 260px; overflow-y: auto; min-width: 160px;
  }
  .sel-legend-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #64748b; margin-bottom: 8px; font-weight: 600;
  }
  .sel-legend-item {
    display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
    cursor: pointer;
  }
  .sel-legend-item:hover { opacity: 0.8; }
  .sel-legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .sel-legend-hint {
    font-size: 10px; color: #475569; margin-top: 6px; font-style: italic;
  }
</style>
</head>
<body>

<nav>
  <span class="brand">CVC Exchange</span>
  <a href="index.html">Home</a>
  <a href="map.html" class="active">Flow Map</a>
  <a href="stats.html">Statistics</a>
</nav>

<div class="controls" id="controls">
  <span class="controls-label">Terms</span>
  <div id="term-pills" style="display:flex;gap:8px"></div>
  <div class="controls-separator"></div>
  <div class="slider-group">
    <span class="controls-label">Min Flows</span>
    <input type="range" id="threshold-slider" min="1" max="50" value="5">

<div class="main">
  <div class="map-wrap" id="map-wrap">

    <div class="tooltip" id="tooltip"></div>
    <div class="sel-legend" id="sel-legend">

    <div class="sidebar-stats">

</div>

<footer id="footer"></footer>

<script>
(function() {
  'use strict';

  // --- High-contrast color palette (20 colors, maximally distinct) ---
  var PALETTE = [
    '#ff4444',  // red
    '#00d4ff',  // cyan
    '#ffbb00',  // amber
    '#44ff44',  // green
    '#ff66ff',  // magenta
    '#ff8800',  // orange
    '#00ffaa',  // mint
    '#8866ff',  // purple
    '#ffff44',  // yellow
    '#ff6699',  // pink
    '#44aaff',  // sky blue
    '#88ff44',  // lime
    '#ff4488',  // hot pink
    '#44ffff',  // aqua
    '#ddaa00',  // gold
    '#aa66ff',  // violet
    '#ff8866',  // salmon
    '#00dd88',  // teal
    '#ffaacc',  // light pink
    '#66ddff',  // light blue
  ];

  // --- Projection ---
  function project(lat, lon) {
    var x = (lon - (-124.5)) / ((-114.0) - (-124.5)) * 400;
    var y = (42.0 - lat) / (42.0 - 32.5) * 500;
    return [x, y];
  }

  // --- California outline (detailed) ---
  var caOutline = [
    [42.0, -124.2], [41.99, -120.0], [39.0, -120.0], [38.5, -119.9],
    [37.5, -118.5], [36.5, -117.8], [35.8, -117.6], [35.5, -117.7],
    [35.0, -117.6], [34.8, -117.0], [34.5, -116.1], [34.0, -115.6],
    [33.5, -115.4], [33.0, -115.5], [32.7, -114.7], [32.5, -114.6],
    [32.55, -117.1], [32.8, -117.3], [33.2, -117.5], [33.4, -117.9],
    [33.7, -118.1], [33.8, -118.4], [34.0, -118.6], [34.0, -119.2],
    [34.4, -119.7], [34.45, -120.5], [34.9, -120.6], [35.4, -120.9],
    [35.8, -121.3], [36.3, -121.9], [36.6, -121.9], [36.9, -122.0],
    [37.1, -122.4], [37.5, -122.5], [37.8, -122.5], [37.85, -122.7],
    [38.0, -122.9], [38.3, -123.1], [38.9, -123.6], [39.4, -123.8],
    [40.0, -124.1], [40.4, -124.4], [41.0, -124.1], [41.75, -124.2],
    [42.0, -124.2]
  ];

  // --- State ---
  var data = null;
  var activeTerms = new Set();
  var threshold = 5;
  var selectedColleges = new Set();      // currently selected (visible)
  var colorAssignments = {};             // college name -> color (persists in session)
  var colorIndex = 0;                    // next color to assign
  var lastClickedCollege = null;         // for sidebar display
  var collegeMap = {};
  var svgNS = 'http://www.w3.org/2000/svg';

  // --- DOM ---
  var svg = document.getElementById('map-svg');
  var tooltip = document.getElementById('tooltip');
  var sidebar = document.getElementById('sidebar');
  var mapWrap = document.getElementById('map-wrap');

  // --- SVG Setup ---
  svg.setAttribute('viewBox', '0 0 400 500');
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  // Background
  var bgRect = document.createElementNS(svgNS, 'rect');
  bgRect.setAttribute('width', '400');
  bgRect.setAttribute('height', '500');
  bgRect.setAttribute('fill', '#0a0f1e');
  svg.appendChild(bgRect);

  // California outline group
  var caGroup = document.createElementNS(svgNS, 'g');
  svg.appendChild(caGroup);

  // Flow arcs group
  var flowGroup = document.createElementNS(svgNS, 'g');
  svg.appendChild(flowGroup);

  // Colleges group
  var collegeGroup = document.createElementNS(svgNS, 'g');
  svg.appendChild(collegeGroup);

  // Draw CA outline - VISIBLE
  function drawOutline() {
    var pts = caOutline.map(function(p) { return project(p[0], p[1]); });
    var d = 'M' + pts.map(function(p) { return p[0] + ',' + p[1]; }).join('L') + 'Z';
    // Filled shape
    var fill = document.createElementNS(svgNS, 'path');
    fill.setAttribute('d', d);
    fill.setAttribute('fill', '#111827');
    fill.setAttribute('stroke', 'none');
    caGroup.appendChild(fill);
    // Outline stroke
    var stroke = document.createElementNS(svgNS, 'path');
    stroke.setAttribute('d', d);
    stroke.setAttribute('fill', 'none');
    stroke.setAttribute('stroke', '#334155');
    stroke.setAttribute('stroke-width', '1.2');
    stroke.setAttribute('stroke-linejoin', 'round');
    caGroup.appendChild(stroke);
  }

  // --- Assign color to a college ---
  function assignColor(name) {
    if (colorAssignments[name]) return colorAssignments[name];
    var color = PALETTE[colorIndex % PALETTE.length];
    colorIndex++;
    colorAssignments[name] = color;
    return color;
  }

  function getColor(name) {
    return colorAssignments[name] || null;
  }

  // --- Load data ---
  fetch('data/enrollment_flows.json')
    .then(function(r) { return r.json(); })
    .then(function(json) {
      data = json;
      data.colleges.forEach(function(c) {
        var pos = project(c.lat, c.lon);
        collegeMap[c.name] = { lat: c.lat, lon: c.lon, x: pos[0], y: pos[1] };
      });
      init();
    })
    .catch(function(err) {
      mapWrap.innerHTML =
        '<div style="padding:40px;color:#f87171;">Failed to load data: ' + err.message + '</div>';
    });

  function init() {
    drawOutline();
    buildTermPills();
    setupControls();
    render();
    document.getElementById('footer').textContent =
      'Generated ' + data.generated + ' \u00b7 Validated enrollments only \u00b7 CVC Exchange';
  }

  // --- Term pills ---
  function buildTermPills() {
    var container = document.getElementById('term-pills');
    var terms = Object.keys(data.terms);
    terms.forEach(function(term, idx) {
      var btn = document.createElement('button');
      btn.className = 'term-pill' + (idx === 0 ? ' active' : '');
      btn.dataset.term = term;
      var total = data.terms[term].total;
      btn.innerHTML = term + '<span class="pill-count">(' + total.toLocaleString() + ')</span>';
      btn.addEventListener('click', function() {
        btn.classList.toggle('active');
        if (btn.classList.contains('active')) {
          activeTerms.add(term);
        } else {
          activeTerms.delete(term);
        }
        render();
      });
      container.appendChild(btn);
      if (idx === 0) activeTerms.add(term);
    });
  }

  // --- Controls ---
  function setupControls() {
    var slider = document.getElementById('threshold-slider');
    var val = document.getElementById('threshold-val');
    slider.addEventListener('input', function() {
      threshold = parseInt(slider.value);
      val.textContent = threshold;
      render();
    });

    document.getElementById('btn-csv').addEventListener('click', downloadCSV);

    document.getElementById('btn-clear').addEventListener('click', function() {
      selectedColleges.clear();
      lastClickedCollege = null;
      sidebar.classList.remove('open');
      render();
    });

    document.getElementById('sidebar-close').addEventListener('click', function() {
      sidebar.classList.remove('open');
    });

    mapWrap.addEventListener('mousemove', function(e) {
      if (tooltip.style.display === 'block') {
        var rect = mapWrap.getBoundingClientRect();
        var tx = e.clientX - rect.left + 14;
        var ty = e.clientY - rect.top - 10;
        if (tx + 220 > rect.width) tx = e.clientX - rect.left - 180;
        tooltip.style.left = tx + 'px';
        tooltip.style.top = ty + 'px';
      }
    });
  }

  // --- Aggregate flows across active terms ---
  function getAggregatedFlows() {
    var flowMap = {};
    activeTerms.forEach(function(term) {
      var td = data.terms[term];
      if (!td || !td.flows) return;
      td.flows.forEach(function(f) {
        var key = f.from + '|||' + f.to;
        if (!flowMap[key]) {
          flowMap[key] = { from: f.from, to: f.to, count: 0, terms: {} };
        }
        flowMap[key].count += f.count;
        flowMap[key].terms[term] = f.count;
      });
    });
    return Object.values(flowMap);
  }

  // --- Compute college volumes ---
  function getCollegeVolumes(flows) {
    var vols = {};
    flows.forEach(function(f) {
      if (!vols[f.from]) vols[f.from] = { out: 0, in: 0 };
      if (!vols[f.to]) vols[f.to] = { out: 0, in: 0 };
      vols[f.from].out += f.count;
      vols[f.to].in += f.count;
    });
    return vols;
  }

  // --- Update selected colleges legend ---
  function updateLegend() {
    var items = document.getElementById('sel-legend-items');
    items.innerHTML = '';
    var hint = document.querySelector('.sel-legend-hint');
    if (selectedColleges.size === 0) {
      hint.style.display = 'block';
      return;
    }
    hint.style.display = 'none';
    selectedColleges.forEach(function(name) {
      var color = getColor(name);
      var div = document.createElement('div');
      div.className = 'sel-legend-item';
      div.innerHTML =
        '<span class="sel-legend-dot" style="background:' + color + '"></span>' +
        '<span style="color:' + color + '">' + name + '</span>';
      div.addEventListener('click', function() {
        selectedColleges.delete(name);
        if (lastClickedCollege === name) {
          lastClickedCollege = null;
          sidebar.classList.remove('open');
        }
        render();
      });
      items.appendChild(div);
    });
  }

  // --- Render ---
  function render() {
    var allFlows = getAggregatedFlows();
    var volumes = getCollegeVolumes(allFlows);
    var hasSelection = selectedColleges.size > 0;

    // Filter flows
    var visibleFlows = allFlows.filter(function(f) {
      if (f.count < threshold) return false;
      if (hasSelection) {
        return selectedColleges.has(f.from) || selectedColleges.has(f.to);
      }
      return true;
    });

    // Update badge
    document.getElementById('flow-count-badge').textContent =
      visibleFlows.length + ' flow' + (visibleFlows.length !== 1 ? 's' : '') + ' shown';

    // Update legend
    updateLegend();

    // --- Draw flows ---
    while (flowGroup.firstChild) flowGroup.removeChild(flowGroup.firstChild);

    var maxFlow = 1;
    visibleFlows.forEach(function(f) { if (f.count > maxFlow) maxFlow = f.count; });

    visibleFlows.forEach(function(f) {
      var fromC = collegeMap[f.from];
      var toC = collegeMap[f.to];
      if (!fromC || !toC) return;

      var x1 = fromC.x, y1 = fromC.y, x2 = toC.x, y2 = toC.y;
      var mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      var dx = x2 - x1, dy = y2 - y1;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var offset = Math.min(dist * 0.25, 35);
      var nx = -dy / (dist || 1) * offset;
      var ny = dx / (dist || 1) * offset;
      var cx = mx + nx, cy = my + ny;

      // Determine arc color: use the selected college's color
      var arcColor;
      if (hasSelection) {
        // Prefer "from" college color if selected, else "to"
        if (selectedColleges.has(f.from) && getColor(f.from)) {
          arcColor = getColor(f.from);
        } else if (selectedColleges.has(f.to) && getColor(f.to)) {
          arcColor = getColor(f.to);
        } else {
          arcColor = '#475569';
        }
      } else {
        arcColor = '#475569';
      }

      var thick = 0.5 + (f.count / maxFlow) * 3.5;
      var opacity = hasSelection
        ? 0.35 + (f.count / maxFlow) * 0.55
        : 0.12 + (f.count / maxFlow) * 0.35;

      // Glow layer
      var glow = document.createElementNS(svgNS, 'path');
      glow.setAttribute('d', 'M' + x1 + ',' + y1 + ' Q' + cx + ',' + cy + ' ' + x2 + ',' + y2);
      glow.setAttribute('fill', 'none');
      glow.setAttribute('stroke', arcColor);
      glow.setAttribute('stroke-width', (thick * 2.5).toFixed(2));
      glow.setAttribute('stroke-opacity', (opacity * 0.2).toFixed(3));
      glow.setAttribute('stroke-linecap', 'round');
      flowGroup.appendChild(glow);

      // Main arc
      var path = document.createElementNS(svgNS, 'path');
      path.setAttribute('d', 'M' + x1 + ',' + y1 + ' Q' + cx + ',' + cy + ' ' + x2 + ',' + y2);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', arcColor);
      path.setAttribute('stroke-width', thick.toFixed(2));
      path.setAttribute('stroke-opacity', opacity.toFixed(3));
      path.setAttribute('stroke-linecap', 'round');
      flowGroup.appendChild(path);
    });

    // --- Draw colleges ---
    while (collegeGroup.firstChild) collegeGroup.removeChild(collegeGroup.firstChild);

    var maxVol = 1;
    Object.values(volumes).forEach(function(v) {
      var total = v.out + v.in;
      if (total > maxVol) maxVol = total;
    });

    data.colleges.forEach(function(c) {
      var pos = collegeMap[c.name];
      if (!pos) return;
      var vol = volumes[c.name] || { out: 0, in: 0 };
      var total = vol.out + vol.in;
      var isSelected = selectedColleges.has(c.name);
      var assignedColor = getColor(c.name);
      var r = 2.5 + (total / maxVol) * 6;

      // Determine appearance
      var dotColor, dotOpacity, strokeColor, strokeWidth;
      if (isSelected) {
        dotColor = assignedColor;
        dotOpacity = 1;
        strokeColor = '#fff';
        strokeWidth = 1;
      } else if (hasSelection) {
        // Check if connected to any selected college
        var connected = visibleFlows.some(function(f) {
          return f.from === c.name || f.to === c.name;
        });
        dotColor = connected ? '#94a3b8' : '#334155';
        dotOpacity = connected ? 0.6 : 0.25;
        strokeColor = 'none';
        strokeWidth = 0;
      } else {
        dotColor = '#94a3b8';
        dotOpacity = 0.7;
        strokeColor = 'rgba(255,255,255,0.15)';
        strokeWidth = 0.4;
      }

      var g = document.createElementNS(svgNS, 'g');
      g.style.cursor = 'pointer';

      // Selection ring
      if (isSelected) {
        var ring = document.createElementNS(svgNS, 'circle');
        ring.setAttribute('cx', pos.x);
        ring.setAttribute('cy', pos.y);
        ring.setAttribute('r', r + 5);
        ring.setAttribute('fill', 'none');
        ring.setAttribute('stroke', assignedColor);
        ring.setAttribute('stroke-width', '1.5');
        ring.setAttribute('stroke-opacity', '0.4');
        ring.setAttribute('stroke-dasharray', '3,2');
        g.appendChild(ring);

        // Outer glow
        var glowC = document.createElementNS(svgNS, 'circle');
        glowC.setAttribute('cx', pos.x);
        glowC.setAttribute('cy', pos.y);
        glowC.setAttribute('r', r + 3);
        glowC.setAttribute('fill', assignedColor);
        glowC.setAttribute('fill-opacity', '0.15');
        g.appendChild(glowC);
      }

      var circle = document.createElementNS(svgNS, 'circle');
      circle.setAttribute('cx', pos.x);
      circle.setAttribute('cy', pos.y);
      circle.setAttribute('r', r);
      circle.setAttribute('fill', dotColor);
      circle.setAttribute('fill-opacity', dotOpacity);
      if (strokeColor !== 'none') {
        circle.setAttribute('stroke', strokeColor);
        circle.setAttribute('stroke-width', strokeWidth);
      }
      g.appendChild(circle);

      // Label for selected colleges
      if (isSelected && r > 3) {
        var label = document.createElementNS(svgNS, 'text');
        label.setAttribute('x', pos.x);
        label.setAttribute('y', pos.y - r - 4);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('font-size', '5');
        label.setAttribute('font-family', 'inherit');
        label.setAttribute('fill', assignedColor);
        label.setAttribute('font-weight', '600');
        // Abbreviate: first word + first letter of second
        var parts = c.name.split(' ');
        var abbr = parts.length > 2 ? parts[0] + ' ' + parts[1].charAt(0) + '.' : c.name;
        if (abbr.length > 16) abbr = abbr.substring(0, 14) + '..';
        label.textContent = abbr;
        g.appendChild(label);
      }

      // Hover
      g.addEventListener('mouseenter', function() {
        var html = '<strong>' + c.name + '</strong>';
        if (total > 0) {
          html += '<br>Out: ' + vol.out.toLocaleString() + ' &nbsp; In: ' + vol.in.toLocaleString();
        }
        if (isSelected) html += '<br><span style="color:#64748b">Click to deselect</span>';
        else html += '<br><span style="color:#64748b">Click to select</span>';
        tooltip.innerHTML = html;
        tooltip.style.display = 'block';
      });
      g.addEventListener('mouseleave', function() {
        tooltip.style.display = 'none';
      });

      // Click — toggle selection
      g.addEventListener('click', function() {
        if (selectedColleges.has(c.name)) {
          selectedColleges.delete(c.name);
          if (lastClickedCollege === c.name) {
            // Show sidebar for next selected, or close
            var remaining = Array.from(selectedColleges);
            if (remaining.length > 0) {
              lastClickedCollege = remaining[remaining.length - 1];
              updateSidebar(lastClickedCollege, volumes, allFlows);
            } else {
              lastClickedCollege = null;
              sidebar.classList.remove('open');
            }
          }
        } else {
          assignColor(c.name);
          selectedColleges.add(c.name);
          lastClickedCollege = c.name;
          sidebar.classList.add('open');
          updateSidebar(c.name, volumes, allFlows);
        }
        render();
      });

      collegeGroup.appendChild(g);
    });
  }

  // --- Sidebar ---
  function updateSidebar(name, volumes, allFlows) {
    var color = getColor(name) || '#e2e8f0';
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('sidebar-name').style.color = color;
    var vol = volumes[name] || { out: 0, in: 0 };
    document.getElementById('sidebar-out').textContent = vol.out.toLocaleString();
    document.getElementById('sidebar-in').textContent = vol.in.toLocaleString();

    var connections = [];
    allFlows.forEach(function(f) {
      if (f.from === name) {
        connections.push({ name: f.to, count: f.count, dir: 'out' });
      } else if (f.to === name) {
        connections.push({ name: f.from, count: f.count, dir: 'in' });
      }
    });
    connections.sort(function(a, b) { return b.count - a.count; });

    var list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    connections.slice(0, 40).forEach(function(c) {
      var div = document.createElement('div');
      div.className = 'conn-item';
      div.innerHTML =
        '<span class="conn-dir ' + c.dir + '">' + (c.dir === 'out' ? 'TO' : 'FROM') + '</span>' +
        '<span class="conn-name">' + c.name + '</span>' +
        '<span class="conn-count">' + c.count.toLocaleString() + '</span>';
      list.appendChild(div);
    });
  }

  // --- CSV Download ---
  function downloadCSV() {
    var allFlows = getAggregatedFlows();
    var hasSelection = selectedColleges.size > 0;
    var visibleFlows = allFlows.filter(function(f) {
      if (f.count < threshold) return false;
      if (hasSelection) {
        return selectedColleges.has(f.from) || selectedColleges.has(f.to);
      }
      return true;
    });

    var rows = ['Home College,Teaching College,Term,Count'];
    visibleFlows.forEach(function(f) {
      Object.keys(f.terms).forEach(function(term) {
        rows.push(
          '"' + f.from.replace(/"/g, '""') + '",' +
          '"' + f.to.replace(/"/g, '""') + '",' +
          '"' + term + '",' +
          f.terms[term]
        );
      });
    });

    var blob = new Blob([rows.join('\n')], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'enrollment_flows_map.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

})();
</script>

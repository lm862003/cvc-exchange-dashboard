<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVC Exchange — Enrollment Flow Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  var k = 'cvc-oei-auth';
  if (sessionStorage.getItem(k) !== '1') {
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('main-content').style.display = 'none';
      var overlay = document.createElement('div');
      overlay.id = 'auth-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:9999;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:12px;padding:40px;width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)">' +
        '<div style="font-size:20px;font-weight:700;margin-bottom:8px;color:#1a1a2e">CVC Exchange Dashboard</div>' +
        '<div style="font-size:13px;color:#666;margin-bottom:24px">Enter password to continue</div>' +
        '<input id="pw-input" type="password" placeholder="Password" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none;box-sizing:border-box" />' +
        '<button id="pw-btn" style="width:100%;padding:10px;background:#3a7bd5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Enter</button>' +
        '<div id="pw-err" style="color:#e05252;font-size:12px;margin-top:10px;display:none">Incorrect password</div></div>';
      document.body.appendChild(overlay);
      function attempt() {
        if (document.getElementById('pw-input').value === 'cvc-oei') {
          sessionStorage.setItem(k, '1');
          overlay.remove();
          document.getElementById('main-content').style.display = '';
          initApp();
        } else {
          document.getElementById('pw-err').style.display = 'block';
          document.getElementById('pw-input').value = '';
          document.getElementById('pw-input').focus();
        }
      }
      document.getElementById('pw-btn').addEventListener('click', attempt);
      document.getElementById('pw-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') attempt(); });
      document.getElementById('pw-input').focus();
    });
  } else {
    document.addEventListener('DOMContentLoaded', initApp);
  }
})();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f4f6f9; color: #111; font-size: 14px; display: flex; flex-direction: column; }

  /* Nav */
  nav { background: #1a1a2e; color: #fff; display: flex; align-items: center;
        padding: 0 32px; height: 56px; flex-shrink: 0; }
  nav .brand { font-size: 16px; font-weight: 700; margin-right: 40px; letter-spacing: -0.02em; }
  nav a { color: rgba(255,255,255,.6); text-decoration: none; font-size: 13px; font-weight: 600;
          padding: 18px 16px; border-bottom: 3px solid transparent; transition: color .15s; }
  nav a:hover { color: #fff; }
  nav a.active { color: #fff; border-bottom-color: #3a7bd5; }

  /* Controls bar */
  .controls-bar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 8px 24px;
                   display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; }
  .term-pill { padding: 5px 14px; border-radius: 20px; border: 1px solid #ccc; background: #fff;
               font-size: 12px; font-weight: 600; color: #555; cursor: pointer; transition: all .15s; }
  .term-pill.active { background: #3a7bd5; color: #fff; border-color: #3a7bd5; }
  .term-pill:hover:not(.active) { border-color: #3a7bd5; color: #3a7bd5; }
  .mode-toggle { display: flex; border: 1px solid #ccc; border-radius: 6px; overflow: hidden; margin-left: 8px; }
  .mode-btn { padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
              background: #fff; border: none; color: #555; transition: all .15s; }
  .mode-btn.active { background: #1a1a2e; color: #fff; }
  .mode-btn:hover:not(.active) { background: #f0f0f0; }
  .ctrl-sep { width: 1px; height: 24px; background: #ddd; }
  .csv-btn { margin-left: auto; padding: 5px 14px; border-radius: 6px; border: 1px solid #ccc;
             background: #fff; font-size: 12px; color: #333; cursor: pointer; font-weight: 600; }
  .csv-btn:hover { background: #f0f0f0; }

  /* Main content wrapper */
  #main-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

  /* Layout */
  .app-layout { display: flex; flex: 1; overflow: hidden; }

  /* Left sidebar */
  .sidebar-left { width: 240px; background: #f8f9fa; border-right: 1px solid #e0e0e0;
                  display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-left .header { padding: 14px 14px 0; }
  .sidebar-left .header h3 { font-size: 13px; font-weight: 700; color: #111; margin-bottom: 8px;
                              display: flex; justify-content: space-between; align-items: center; }
  .sidebar-left .header .clear-btn { font-size: 11px; color: #3a7bd5; cursor: pointer;
                                      background: none; border: none; font-weight: 600; }
  .sidebar-left .header .clear-btn:hover { text-decoration: underline; }
  .mode-label { font-size: 11px; color: #888; padding: 0 14px 8px; }
  .search-input { width: calc(100% - 28px); margin: 0 14px 10px; padding: 7px 10px;
                  border: 1px solid #ddd; border-radius: 6px; font-size: 12px; outline: none; }
  .search-input:focus { border-color: #3a7bd5; }
  .college-list { flex: 1; overflow-y: auto; padding: 0 0 10px; }
  .college-row { padding: 6px 14px; display: flex; align-items: center; gap: 8px;
                 cursor: pointer; transition: background .1s; font-size: 12px; color: #333; }
  .college-row:hover { background: #e8edf2; }
  .college-row.selected { background: #e3ecf7; border-left: 3px solid; padding-left: 11px; }
  .college-dot { width: 10px; height: 10px; border-radius: 50%; background: #bbb; flex-shrink: 0; }
  .college-row.selected .college-dot { width: 12px; height: 12px; }
  .college-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .college-check { font-size: 14px; color: #3a7bd5; display: none; }
  .college-row.selected .college-check { display: block; }

  /* Map */
  .map-wrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* Right sidebar */
  .sidebar-right { width: 280px; background: #f8f9fa; border-left: 1px solid #e0e0e0;
                   display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  .sidebar-right .empty-msg { padding: 40px 20px; text-align: center; color: #888; font-size: 13px; line-height: 1.6; }
  .stats-panel { padding: 16px; }
  .stats-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
  .stat-boxes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-box { background: #fff; border-radius: 8px; padding: 12px; text-align: center;
              border: 1px solid #e0e0e0; }
  .stat-box .val { font-size: 22px; font-weight: 700; color: #3a7bd5; }
  .stat-box .lbl { font-size: 10px; text-transform: uppercase; color: #888; letter-spacing: .04em; margin-top: 2px; }
  .flow-section { margin-bottom: 16px; }
  .flow-section h4 { font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase;
                     letter-spacing: .04em; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #e0e0e0; }
  .flow-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; color: #333; }
  .flow-item .cnt { font-weight: 700; color: #3a7bd5; }

  /* Footer */
  .footer { background: #fff; border-top: 1px solid #e0e0e0; padding: 8px 24px;
            font-size: 11px; color: #888; text-align: center; flex-shrink: 0; }
</style>
</head>
<body>
<div id="main-content">
  <nav>
    <span class="brand">CVC Exchange</span>
    <a href="index.html">Home</a>
    <a href="map.html" class="active">Flow Map</a>
    <a href="stats.html">Statistics</a>
  </nav>
  <div class="controls-bar" id="controls-bar">
    <span style="font-size:12px;font-weight:600;color:#666;">Terms:</span>
    <div id="term-pills" style="display:flex;gap:6px"></div>
    <div class="ctrl-sep"></div>
    <span style="font-size:12px;font-weight:600;color:#666;">Mode:</span>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-home">Home College</button>
      <button class="mode-btn" id="mode-teaching">Teaching College</button>
    </div>
    <button class="csv-btn" id="csv-btn" title="Download visible flows as CSV">Download CSV</button>
  </div>
  <div class="app-layout">
    <div class="sidebar-left">
      <div class="header">
        <h3>Colleges <span id="sel-count" style="font-weight:400;color:#888;font-size:11px">(0 selected)</span>
          <button class="clear-btn" id="clear-btn">Clear</button></h3>
      </div>
      <div class="mode-label" id="mode-label">Select colleges to see outgoing enrollment flows</div>
      <input type="text" class="search-input" id="search-input" placeholder="Filter colleges..." />
      <div class="college-list" id="college-list"></div>
    </div>
    <div class="map-wrap">
      <div id="map"></div>
    </div>
    <div class="sidebar-right" id="sidebar-right">
      <div class="empty-msg">Select a college from the left panel to see enrollment flow details</div>
    </div>
  </div>
  <div class="footer" id="footer"></div>
</div>

<script>
var DATA = null;
var leafletMap, svgEl;
var collegeMarkers = {};
var selectedColleges = {};
var colorAssignment = {};
var colorIndex = 0;
var lastClicked = null;
var currentMode = 'home'; // 'home' or 'teaching'

var COLORS = ['#e6194b','#3cb44b','#4363d8','#f58231','#911eb4','#42d4f4','#f032e6','#bfef45',
  '#fabed4','#469990','#dcbeff','#9A6324','#800000','#aaffc3','#808000','#000075','#a9a9a9',
  '#e6beff','#ffe119','#ffd8b1'];

var activeTerms = {};
var collegeLookup = {}; // name -> {lat, lon}

function initApp() {
  leafletMap = L.map('map', { zoomControl: true }).setView([37.2, -119.5], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(leafletMap);

  // SVG overlay for arcs
  svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:400;';
  leafletMap.getPanes().overlayPane.appendChild(svgEl);

  leafletMap.on('moveend zoomend', function() { resizeSVG(); drawArcs(); });

  fetch('data/enrollment_flows.json')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      DATA = d;
      d.colleges.forEach(function(c) { collegeLookup[c.name] = c; });
      buildTermPills();
      buildCollegeList();
      plotColleges();
      setTimeout(function() { leafletMap.invalidateSize(); resizeSVG(); }, 100);
      document.getElementById('footer').textContent =
        'Generated ' + d.generated + ' \u00b7 Validated enrollments only \u00b7 CVC Exchange';
    })
    .catch(function(err) {
      document.getElementById('footer').textContent = 'Failed to load data: ' + err.message;
    });

  document.getElementById('search-input').addEventListener('input', filterCollegeList);
  document.getElementById('clear-btn').addEventListener('click', clearAll);
  document.getElementById('csv-btn').addEventListener('click', downloadCSV);

  // Mode toggle
  document.getElementById('mode-home').addEventListener('click', function() { setMode('home'); });
  document.getElementById('mode-teaching').addEventListener('click', function() { setMode('teaching'); });
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-home').classList.toggle('active', mode === 'home');
  document.getElementById('mode-teaching').classList.toggle('active', mode === 'teaching');
  document.getElementById('mode-label').textContent = mode === 'home'
    ? 'Select colleges to see outgoing enrollment flows'
    : 'Select colleges to see incoming enrollment flows';
  // Reset selections
  selectedColleges = {};
  lastClicked = null;
  updateUI();
}

function buildTermPills() {
  var container = document.getElementById('term-pills');
  var terms = Object.keys(DATA.terms);
  terms.forEach(function(t, i) {
    var btn = document.createElement('button');
    btn.className = 'term-pill' + (i === 0 ? ' active' : '');
    btn.textContent = t;
    btn.dataset.term = t;
    if (i === 0) activeTerms[t] = true;
    btn.addEventListener('click', function() {
      if (activeTerms[t]) { delete activeTerms[t]; btn.classList.remove('active'); }
      else { activeTerms[t] = true; btn.classList.add('active'); }
      drawArcs();
      updateStats();
    });
    container.appendChild(btn);
  });
}

function buildCollegeList() {
  var list = document.getElementById('college-list');
  var sorted = DATA.colleges.slice().sort(function(a, b) { return a.name.localeCompare(b.name); });
  sorted.forEach(function(c) {
    var row = document.createElement('div');
    row.className = 'college-row';
    row.dataset.name = c.name;
    row.innerHTML = '<span class="college-dot"></span>' +
      '<span class="college-name" title="' + esc(c.name) + '">' + esc(c.name) + '</span>' +
      '<span class="college-check">\u2713</span>';
    row.addEventListener('click', function() { toggleCollege(c.name); });
    list.appendChild(row);
  });
}

function filterCollegeList() {
  var q = document.getElementById('search-input').value.toLowerCase();
  var rows = document.getElementById('college-list').children;
  for (var i = 0; i < rows.length; i++) {
    rows[i].style.display = rows[i].dataset.name.toLowerCase().indexOf(q) !== -1 ? '' : 'none';
  }
}

function getColor(name) {
  if (colorAssignment[name] !== undefined) return COLORS[colorAssignment[name] % COLORS.length];
  colorAssignment[name] = colorIndex++;
  return COLORS[colorAssignment[name] % COLORS.length];
}

function toggleCollege(name) {
  if (selectedColleges[name]) {
    delete selectedColleges[name];
    if (lastClicked === name) {
      var keys = Object.keys(selectedColleges);
      lastClicked = keys.length > 0 ? keys[keys.length - 1] : null;
    }
  } else {
    selectedColleges[name] = true;
    getColor(name);
    lastClicked = name;
  }
  updateUI();
}

function clearAll() {
  selectedColleges = {};
  lastClicked = null;
  updateUI();
}

function updateUI() {
  updateSidebarList();
  updateMarkers();
  drawArcs();
  updateStats();
  var n = Object.keys(selectedColleges).length;
  document.getElementById('sel-count').textContent = '(' + n + ' selected)';
}

function updateSidebarList() {
  var rows = document.getElementById('college-list').children;
  for (var i = 0; i < rows.length; i++) {
    var name = rows[i].dataset.name;
    var sel = !!selectedColleges[name];
    rows[i].classList.toggle('selected', sel);
    var dot = rows[i].querySelector('.college-dot');
    if (sel) {
      var c = getColor(name);
      dot.style.background = c;
      rows[i].style.borderLeftColor = c;
    } else {
      dot.style.background = '#bbb';
      rows[i].style.borderLeftColor = '';
    }
  }
}

function plotColleges() {
  DATA.colleges.forEach(function(c) {
    if (c.lat === 0 && c.lon === 0) return; // skip bad coords
    var marker = L.circleMarker([c.lat, c.lon], {
      radius: 5, fillColor: '#aaa', fillOpacity: 0.6, color: '#888', weight: 1
    }).addTo(leafletMap);
    marker.bindTooltip(c.name, { direction: 'top', offset: [0, -8] });
    marker.on('click', function() { toggleCollege(c.name); });
    collegeMarkers[c.name] = marker;
  });
}

function updateMarkers() {
  DATA.colleges.forEach(function(c) {
    var m = collegeMarkers[c.name];
    if (!m) return;
    if (selectedColleges[c.name]) {
      var col = getColor(c.name);
      m.setStyle({ radius: 9, fillColor: col, fillOpacity: 1, color: col, weight: 2 });
    } else {
      m.setStyle({ radius: 5, fillColor: '#aaa', fillOpacity: 0.6, color: '#888', weight: 1 });
    }
  });
}

function getAggregatedFlows() {
  var flows = {};
  Object.keys(activeTerms).forEach(function(term) {
    var td = DATA.terms[term];
    if (!td) return;
    td.flows.forEach(function(f) {
      var key = f.from + '|' + f.to;
      flows[key] = (flows[key] || 0) + f.count;
    });
  });
  return flows;
}

function resizeSVG() {
  if (!leafletMap) return;
  var size = leafletMap.getSize();
  var topLeft = leafletMap.containerPointToLayerPoint([0, 0]);
  svgEl.setAttribute('width', size.x);
  svgEl.setAttribute('height', size.y);
  L.DomUtil.setPosition(svgEl, topLeft);
}

function drawArcs() {
  while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);
  if (!DATA) return;

  var flows = getAggregatedFlows();
  var selNames = Object.keys(selectedColleges);
  if (selNames.length === 0) return;

  // Collect visible flows based on mode
  var visible = [];
  var maxCount = 1;
  Object.keys(flows).forEach(function(key) {
    var parts = key.split('|');
    var from = parts[0], to = parts[1], count = flows[key];
    var show = false;
    if (currentMode === 'home') {
      // Show arcs FROM selected colleges (outgoing)
      show = !!selectedColleges[from];
    } else {
      // Show arcs TO selected colleges (incoming)
      show = !!selectedColleges[to];
    }
    if (show) {
      visible.push({ from: from, to: to, count: count });
      if (count > maxCount) maxCount = count;
    }
  });

  var origin = leafletMap.containerPointToLayerPoint([0, 0]);

  visible.forEach(function(f) {
    var fromC = collegeLookup[f.from];
    var toC = collegeLookup[f.to];
    if (!fromC || !toC) return;
    if ((fromC.lat === 0 && fromC.lon === 0) || (toC.lat === 0 && toC.lon === 0)) return;

    var p1 = leafletMap.latLngToLayerPoint([fromC.lat, fromC.lon]);
    var p2 = leafletMap.latLngToLayerPoint([toC.lat, toC.lon]);
    var x1 = p1.x - origin.x, y1 = p1.y - origin.y;
    var x2 = p2.x - origin.x, y2 = p2.y - origin.y;

    var mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    var dx = x2 - x1, dy = y2 - y1;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 2) return;
    var offset = Math.min(dist * 0.2, 50);
    var nx = -dy / dist, ny = dx / dist;
    var cx = mx + nx * offset, cy = my + ny * offset;

    var thickness = Math.max(1, Math.min(6, (f.count / maxCount) * 6));
    // Color based on the selected college in this flow
    var color;
    if (currentMode === 'home') {
      color = getColor(f.from);
    } else {
      color = getColor(f.to);
    }

    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M' + x1 + ',' + y1 + ' Q' + cx + ',' + cy + ' ' + x2 + ',' + y2);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', thickness);
    path.setAttribute('stroke-opacity', '0.55');
    path.setAttribute('stroke-linecap', 'round');
    svgEl.appendChild(path);
  });
}

function updateStats() {
  var panel = document.getElementById('sidebar-right');
  if (!lastClicked || !selectedColleges[lastClicked]) {
    panel.innerHTML = '<div class="empty-msg">Select a college from the left panel to see enrollment flow details</div>';
    return;
  }

  var name = lastClicked;
  var color = getColor(name);
  var flows = getAggregatedFlows();

  var outgoing = [], incoming = [];
  var outTotal = 0, inTotal = 0;

  Object.keys(flows).forEach(function(key) {
    var parts = key.split('|');
    var from = parts[0], to = parts[1], count = flows[key];
    if (from === name) { outgoing.push({ name: to, count: count }); outTotal += count; }
    if (to === name) { incoming.push({ name: from, count: count }); inTotal += count; }
  });

  outgoing.sort(function(a, b) { return b.count - a.count; });
  incoming.sort(function(a, b) { return b.count - a.count; });

  var html = '<div class="stats-panel">';
  html += '<h3 style="color:' + color + '">' + esc(name) + '</h3>';
  html += '<div class="stat-boxes">';
  html += '<div class="stat-box"><div class="val">' + outTotal.toLocaleString() + '</div><div class="lbl">As Home (Outgoing)</div></div>';
  html += '<div class="stat-box"><div class="val">' + inTotal.toLocaleString() + '</div><div class="lbl">As Teaching (Incoming)</div></div>';
  html += '</div>';

  if (currentMode === 'home' && outgoing.length > 0) {
    html += '<div class="flow-section"><h4>Enrolled At (' + outgoing.length + ' colleges)</h4>';
    outgoing.forEach(function(f) {
      html += '<div class="flow-item"><span>' + esc(f.name) + '</span><span class="cnt">' + f.count.toLocaleString() + '</span></div>';
    });
    html += '</div>';
  }

  if (currentMode === 'teaching' && incoming.length > 0) {
    html += '<div class="flow-section"><h4>Students From (' + incoming.length + ' colleges)</h4>';
    incoming.forEach(function(f) {
      html += '<div class="flow-item"><span>' + esc(f.name) + '</span><span class="cnt">' + f.count.toLocaleString() + '</span></div>';
    });
    html += '</div>';
  }

  // Always show both sections but highlight the active mode's
  if (currentMode === 'home' && incoming.length > 0) {
    html += '<div class="flow-section" style="opacity:.6"><h4>Also Teaching For (' + incoming.length + ')</h4>';
    incoming.slice(0, 10).forEach(function(f) {
      html += '<div class="flow-item"><span>' + esc(f.name) + '</span><span class="cnt">' + f.count.toLocaleString() + '</span></div>';
    });
    if (incoming.length > 10) html += '<div style="color:#888;font-size:11px;padding-top:4px">+ ' + (incoming.length - 10) + ' more</div>';
    html += '</div>';
  }

  if (currentMode === 'teaching' && outgoing.length > 0) {
    html += '<div class="flow-section" style="opacity:.6"><h4>Also Home For (' + outgoing.length + ')</h4>';
    outgoing.slice(0, 10).forEach(function(f) {
      html += '<div class="flow-item"><span>' + esc(f.name) + '</span><span class="cnt">' + f.count.toLocaleString() + '</span></div>';
    });
    if (outgoing.length > 10) html += '<div style="color:#888;font-size:11px;padding-top:4px">+ ' + (outgoing.length - 10) + ' more</div>';
    html += '</div>';
  }

  if (outgoing.length === 0 && incoming.length === 0) {
    html += '<div style="color:#888;font-size:12px;margin-top:8px;">No flows for the selected terms.</div>';
  }

  html += '</div>';
  panel.innerHTML = html;
}

function downloadCSV() {
  if (!DATA) return;
  var flows = getAggregatedFlows();
  var selNames = Object.keys(selectedColleges);
  var lines = ['Home College,Teaching College,Enrollments'];

  Object.keys(flows).forEach(function(key) {
    var parts = key.split('|');
    var from = parts[0], to = parts[1], count = flows[key];
    var show = selNames.length === 0;
    if (!show) {
      if (currentMode === 'home') show = !!selectedColleges[from];
      else show = !!selectedColleges[to];
    }
    if (show) {
      lines.push('"' + from.replace(/"/g, '""') + '","' + to.replace(/"/g, '""') + '",' + count);
    }
  });

  var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'cvc_enrollment_flows.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
